<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
    <table border="1">
        <tr>

            <td colspan="4" style="background-color:blue;color:white ;">
                <p>Não é associado? Faça seu cadastro</p>
            </td>
           
            


        </tr>
       
        <tr>
            <td>
                <label>Nome:</label>
            </td>
            <td colspan="3" >
                <input type="text" name="nome">
            </td>
           
        </tr>
         <tr>
            <td>
                <label>Nome Completo:</label>
            </td>
            <td colspan="3" >
                <input type="text" name="nomec">
            </td>
           
        </tr>
         <tr>
            <td>
                <label>CPF:</label>
            </td>
            <td colspan="3" >
                <input type="text" name="cpf">
            </td>
           
        </tr>
         <tr>
            <td>
                <label>E-mail:</label>
            </td>
            <td colspan="3" >
                <input type="email" name="email" >
            </td>
           
        </tr>
         <tr>
            <td>
                <label>Website:</label>
            </td>
            <td colspan="3" >
                <input type="text" name="website">
            </td>
           
        </tr>
         <tr>
            <td>
                <label>Endereço:</label>
            </td>
            <td colspan="3" >
                <input type="text" name="endereco" size="40" >
            </td>
           
        </tr>
        <tr>
            <td>
                <label>Bairro:</label>
            </td>
            <td>
                <input type="text" name="bairro">
            </td>
            <td>
                <label>Cidade:</label>
            </td>
            <td>
                <input type="text" name="cidade">
            </td>
           
        </tr>
        <tr>
            <td>
                <label>CEP:</label>
            </td>
            <td>
                <input type="text" name="CEP">
            </td>
            <td>
                <label>UF:</label>
            </td>
            <td>
                <select>
                    <option>RS</option>
                    <option>SC</option>
                    <option>PR</option>
                </select>
            </td>
           
        </tr>
        <tr>
            <td>
                <label>Telefone:</label>
            </td>
            <td>
                <input type="text" name="fone">
            </td>
            <td>
                <label>Fax:</label>
            </td>
            <td>
                <input type="text" name="fax">
            </td>
           
        </tr>
        <tr>
            <td>
                <label>DataNascimento:</label>
            </td>
            <td>
                <input type="date" name="DataNascimento">
            </td>
            <td>
                <label>Sexo:</label>
            </td>
            <td>
                <input type="radio" name="sexo" value="Feminino">Feminino
                <input type="radio" name="sexo" value="Masculino">Masculino
            </td>
           
        </tr>
        <tr>
            <td>
                <label>Celular:</label>
            </td>
            <td>
                <input type="text" name="celular">
            </td>
            <td>
                <label>Estado Civil:</label>
            </td>
            <td>
                <select name="estadocivil">
                    <option value="solteiro">Solteiro(a)</option>
                    <option value="casado">Casado(a)</option>
                    <option value="casado">Divorciado(a)</option>

                </select>
            </td>
           
        </tr>
         <tr>
            <td>
                <label>Login:</label>
            </td>
            <td>
                <input type="text" name="login">
            </td>
            <td>
                <label>Senha:</label>
            </td>
            <td>
                <input type="password" name="senha">
            </td>
           
        </tr>
        <tr>
            <td colspan="4">
                <p>Deseja receber informações sobre os seguintes assuntos abaixo:</p>
            </td>
        </tr>
        <tr>

            <td colspan="4">
                <input type="checkbox" value="tecnologia" name="assunto1">Tecnologia
                <input type="checkbox" value="Esportes" name="assunto2">Esportes
                <input type="checkbox" value="automoveis" name="assunto3">Automóveis
                <input type="checkbox" value="culinaria" name="assunto4">Culinária
                <input type="checkbox" value="politica" name="assunto5">Política
                 <input type="checkbox" value="tempo" name="assunto6">Tempo
            </td>
        </tr>
         <tr>

            <td colspan="4">
                <input type="checkbox" value="cultura" name="assunto7">Cultura
                <input type="checkbox" value="economia" name="assunto8">Economia
                <input type="checkbox" value="jogos" name="assunto9">Jogos
                <input type="checkbox" value="educacao" name="assunto10">Educação
                <input type="checkbox" value="viagem" name="assunto11">Viagem
                 <input type="checkbox" value="empregos" name="assunto12">Empregos
            </td>
        </tr>
         <tr>

            <td colspan="4">
                <input type="checkbox" value="autorizo" name="regras">Li as regras de cadastro e autorizo a criação do usuário
                
            </td>
        </tr>
        <tr>
             <td colspan="4">
                <input type="submit" name="Confirmar" value="Confirmar">
                <input type="reset" name="Retornar" value="Retornar">
             </td>

        </tr>




        
    </table>
    </form>

</body>

</html>
